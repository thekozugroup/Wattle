name: Wattle CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Unit tests
        run: python3 -m unittest discover tests
      - name: Skill validation
        run: python3 - <<'PY'
          import re
          from pathlib import Path

          skill = Path("wattle/SKILL.md")
          text = skill.read_text(encoding="utf-8")
          assert text.startswith("---\n"), "missing frontmatter"
          assert re.search(r"^name:\s*wattle$", text, re.MULTILINE), "missing skill name"
          assert re.search(r"^description:\s*.+", text, re.MULTILINE), "missing description"
          assert Path("wattle/agents/openai.yaml").exists(), "missing openai metadata"
          assert Path("wattle/scripts/wattle.py").exists(), "missing CLI"
          print("Skill is valid")
          PY
      - name: Full grader waves
        run: python3 wattle/scripts/wattle.py grade --full --waves 15 --json
      - name: Release bundle
        run: |
          python3 scripts/build_skill_bundle.py
          test -s dist/Wattle.skill
          tmpdir="$(mktemp -d)"
          bash dist/Wattle.skill --extract "$tmpdir"
          test -f "$tmpdir/wattle/SKILL.md"
          test -f "$tmpdir/wattle/scripts/wattle.py"
      - name: Forbidden tag and secret scan
        run: |
          ! git grep -n -E 'Co-authored-by|Generated by|AI-assisted|Claude|PRIVATE KEY|BEGIN RSA|AWS_SECRET|OPENAI_API_KEY|GITHUB_TOKEN|password\s*=|secret\s*=' -- . ':!.github/workflows/ci.yml' ':!README.md'
